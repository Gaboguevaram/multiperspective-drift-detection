configuracion_global:
  ruta_log: "./data/01_raw/control_flow/recurring/cd-7500.xes"
  debug: true
  primera_tarea: 'Loan_application_received'
  ultima_tarea: 'Finish_process'
  ventana:
    tipo: 'trazas'
    tamano_ventana: 100
    salto_ventana: 1
    primera_traza: null
    autoajuste: true
    # Suelo del autoajuste por encima del 1% (=25) de la tesis: con ventanas de ~25
    # trazas la precisión oscila (un path raro entra/sale del DFR) y genera falsos
    # positivos (Fig. 3.8: ventanas <25 penalizan F_score). 50 sigue dentro de la
    # banda óptima 25-100 y estabiliza la detección tras los reajustes post-drift.
    ajuste_n_min: 25

perspectivas:
  - nombre: "control_flow"
    op_filtrado:
      - "filtrar_trazas_completas"
    op_transformaciones:
      - "transformacion_simple"
    modelo: "inductive_miner"
    metricas:
      - "precision"
      - "fitness"
    op_det_concept_drift: "deteccion_regresion"
    n_regresion: 50
    n_confirmacion: 100
    avance: "normal"