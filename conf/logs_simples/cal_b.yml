configuracion_global:
  # CAL-B (ampliación de jornada -> sube el soporte invertido). Caso C: Marta L-V->L-D, Carlos constante.
  ruta_log: "./data/01_raw/calendar/CAL-B/cal_b-5000-single.csv"
  debug: false
  primera_tarea: 'A'
  ultima_tarea: 'E'
  recurso_esperado: "Marta"  # ground truth: el recurso que cambia (validación por recurso)

perspectivas:
  - nombre: "calendar"
    ventana:
      tipo: 'temporal'
      tamano_ventana: "30 days"
      salto_ventana: "18 hours"
      fecha_inicial: null
    op_filtrado:
      - "filtrado_calendarios"
    op_transformaciones:
      - "transformacion_calendarios"
    modelo: "modelo_calendarios"
    metricas:
      - "soporte"
      - "soporte_invertido"
    op_det_concept_drift: "deteccion_regresion"
    n_regresion: 35
    n_confirmacion: 70
    avance: "normal"
