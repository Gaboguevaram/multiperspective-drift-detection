configuracion_global:
  ruta_log: "./data/01_raw/arrival_rate/Caso_A/N-1800-1500-900-750_sudden_5000.csv"
  debug: true
  primera_tarea: 'A'
  ultima_tarea: 'E'
  ventana:
      tipo: 'temporal'
      tamano_ventana: __TAMANO_VENTANA__
      salto_ventana: __SALTO_VENTANA__
      fecha_inicial: null

perspectivas:
  # Perspectiva: Arrival Rate (template con placeholders)
  - nombre: "arrival_rate"
    op_filtrado:
      - "filtrado_arrival_rate"
    op_transformaciones:
      - "transformacion_arrival_rate"
    frecuencia_arrival_rate: __FRECUENCIA_ARRIVAL_RATE__
    granularidad_arrival_rate: __GRANULARIDAD_ARRIVAL_RATE__
    modelo: "modelo_arrival_rate"
    metrica_validacion_modelo: "MAE"
    metricas:
      - "MAE"
    op_det_concept_drift: "deteccion_regresion"
    n_regresion: __N_REGRESION__
    n_confirmacion: __N_CONFIRMACION__
    avance: "normal"