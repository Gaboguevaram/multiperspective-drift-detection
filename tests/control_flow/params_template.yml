configuracion_global:
  # ruta_log se ignora: test_perspectivas pasa el log cargado al orquestador.
  ruta_log: "./data/01_raw/control_flow/single/cb-5000-single.csv"
  debug: false
  primera_tarea: 'Loan_application_received'
  ultima_tarea: 'Finish_process'
  # Ventana temporal con placeholders que rellena la optimización con Optuna.
  ventana:
    tipo: 'temporal'
    tamano_ventana: __TAMANO_VENTANA__
    salto_ventana: __SALTO_VENTANA__
    fecha_inicial: null
    autoajuste: false

perspectivas:
  - nombre: "control_flow"
    op_filtrado:
      - "filtrar_trazas_completas"
    op_transformaciones:
      - "transformacion_simple"
    modelo: "inductive_miner"
    metricas:
      - "precision"
      - "fitness"
    op_det_concept_drift: "deteccion_regresion"
    n_regresion: __N_REGRESION__
    n_confirmacion: __N_CONFIRMACION__
    avance: "on_trace"
